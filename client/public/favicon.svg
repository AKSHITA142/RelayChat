<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bgGradient)"/>
  
  <!-- Chat bubble icon -->
  <path d="M8 10 Q8 8 10 8 L22 8 Q24 8 24 10 L24 18 Q24 20 22 20 L12 20 L8 24 L8 20 Q8 20 8 18 Z" 
        fill="url(#iconGradient)" 
        stroke="none"/>
  
  <!-- Chat dots -->
  <circle cx="12" cy="14" r="1.5" fill="#3b82f6"/>
  <circle cx="16" cy="14" r="1.5" fill="#3b82f6"/>
  <circle cx="20" cy="14" r="1.5" fill="#3b82f6"/>
  
  <!-- Subtle glow effect -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
</svg>
